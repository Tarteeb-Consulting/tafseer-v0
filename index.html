<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tafseer v0 - Explore the Holy Quran</title>
    <meta name="description" content="A premium platform for understanding the Tafseer and meanings of the Holy Quran.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    
    <header class="navbar">
        <div class="container">
            <div class="logo">
                <span class="arabic">التفسير</span>
                <span class="latin">Tafseer v0</span>
            </div>
            <nav>
                <ul>
                    <li><a href="#home" class="active">Home</a></li>
                    <li><a href="#surahs">Surahs</a></li>
                    <li><a href="#about">About</a></li>
                </ul>
            </nav>
            <div class="actions">
                <button id="theme-toggle" aria-label="Toggle dark mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main id="app">
        <section id="home-page" class="page active">
            <section class="hero">
                <div class="hero-overlay"></div>
                <div class="container">
                    <div class="hero-content">
                        <h1>Explore the Divine Wisdom</h1>
                        <p>Deep dive into the meanings of the Holy Quran with authentic Tafseer sources.</p>
                        <div class="search-container">
                            <input type="text" placeholder="Search Surah..." id="quran-search">
                        </div>
                    </div>
                </div>
            </section>

            <section id="surahs" class="surah-grid-section">
                <div class="container">
                    <div class="section-header">
                        <h2>All Surahs</h2>
                        <p>Browse through the 114 chapters of the Holy Quran.</p>
                    </div>
                    <div class="surah-grid" id="surah-container">
                        <div class="loader-container">
                            <div class="spinner"></div>
                            <p>Fetching Surahs...</p>
                        </div>
                    </div>
                </div>
            </section>
        </section>

        <section id="detail-page" class="page">
            <div class="container">
                <button id="back-btn" class="btn-back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Back to Surahs
                </button>
                <div id="surah-detail-content">
                    <!-- Detail content will be injected here -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Tafseer v0 - Tarteeb Consulting Project</p>
        </div>
    </footer>

    <script type="module" src="./main.js"></script>
</body>
</html>
